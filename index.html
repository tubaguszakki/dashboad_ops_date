<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Picker – Tableau</title>
  <link rel="stylesheet" href="style.css">
  <!-- Tableau Extensions API — otomatis diabaikan kalau dibuka di browser biasa -->
  <script src="https://extensions.tableauusercontent.com/resources/tableau.extensions.1.latest.min.js"></script>
</head>
<body>

<div class="card">

  <!-- Mode: Range / Single date -->
  <div class="row">
    <button class="pill on" id="bm-r" onclick="setMode('range')">Range</button>
    <button class="pill"    id="bm-s" onclick="setMode('single')">Single date</button>
  </div>

  <!-- Quick presets (range mode only) -->
  <div class="presets" id="presets">
    <button class="pre" onclick="applyPreset('today')">Hari ini</button>
    <button class="pre" onclick="applyPreset('yesterday')">Kemarin</button>
    <button class="pre" onclick="applyPreset('last7')">7 hari terakhir</button>
    <button class="pre" onclick="applyPreset('thisMonth')">Bulan ini</button>
    <button class="pre" onclick="applyPreset('lastMonth')">Bulan lalu</button>
  </div>

  <!-- Warning / error messages -->
  <div class="warn" id="warn"></div>

  <!-- Period A -->
  <div class="prow">
    <span class="badge ba" id="badge-a">Period A</span>
    <button class="dbox" id="da-s" onclick="openCal('aS')">Pilih tanggal</button>
    <span class="sep" id="sep-a">—</span>
    <button class="dbox" id="da-e" onclick="openCal('aE')">Pilih tanggal</button>
  </div>

  <!-- Period B (visible only in comparison mode) -->
  <div class="prow" id="row-b" style="display:none">
    <span class="badge bb">Period B</span>
    <button class="dbox" id="db-s" onclick="openCal('bS')">Pilih tanggal</button>
    <span class="sep" id="sep-b">—</span>
    <button class="dbox" id="db-e" onclick="openCal('bE')">Pilih tanggal</button>
  </div>

  <!-- Contextual hint -->
  <div class="hint" id="hint"></div>

  <!-- Calendar popup -->
  <div class="cal" id="cal">
    <div class="cal-hd">
      <button class="nav" id="nav-p" onclick="navM(-1)">&#8249;</button>
      <div class="cal-selects">
        <select class="cal-sel" id="sel-month" onchange="onSelMonth()"></select>
        <select class="cal-sel" id="sel-year"  onchange="onSelYear()"></select>
      </div>
      <button class="nav" id="nav-n" onclick="navM(1)">&#8250;</button>
    </div>
    <div class="g7" id="grid"></div>
    <div class="cal-ft">
      <button onclick="closeCal()">Batal</button>
      <button class="done" id="done-btn" onclick="closeCal()">Selesai</button>
    </div>
  </div>

  <hr>

  <!-- Comparison mode toggle -->
  <div class="row" style="margin-bottom:0">
    <button class="tgl" id="tgl" onclick="toggleComp()" aria-label="Comparison mode"></button>
    <span style="font-size:12px;color:#3a6070">Comparison mode</span>
  </div>

  <!-- Send to Tableau -->
  <button class="apply" id="apply-btn" onclick="applyAll()" disabled>
    &#10003; Terapkan ke Dashboard
  </button>

  <!-- Summary status -->
  <div class="status" id="status">Belum ada tanggal dipilih.</div>

</div>

<script src="script.js"></script>
</body>
</html>
